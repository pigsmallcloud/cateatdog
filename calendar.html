<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="猫吃狗 - 日记日历" />
    <meta property="og:title" content="猫吃狗 - 日历" />
    <meta property="og:description" content="通过日历查阅日记" />
    <title>猫吃狗 - 日历</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>"
    />
  </head>
  <body>
    <!-- 顶部导航 -->
    <header class="site-header">
      <div class="header-inner">
        <div class="site-title">
          <a href="index.html">🐱 猫吃狗</a>
        </div>
        <nav class="site-nav">
          <a href="index.html" class="nav-btn">
            <span class="icon">📝</span> 时间线
          </a>
          <a href="calendar.html" class="nav-btn active">
            <span class="icon">📅</span> 日历
          </a>
          <a href="search.html" class="nav-btn">
            <span class="icon">🔍</span> 搜索
          </a>
          <button class="nav-btn" onclick="Admin.openEditor()" title="写新日记">
            <span class="icon">✏️</span> 写日记
          </button>
          <button
            class="nav-btn"
            onclick="Admin.showSettings()"
            title="GitHub 设置"
          >
            <span class="icon">⚙️</span>
          </button>
        </nav>
      </div>
    </header>

    <!-- 主内容 -->
    <main class="main-content calendar-page">
      <!-- 年视图 -->
      <div id="calendarContainer"></div>

      <!-- 月份详情（点击日期后展开） -->
      <div id="monthDetail" class="month-view"></div>
    </main>

    <!-- 页脚 -->
    <footer class="site-footer">
      <p>
        © <span id="footerYear"></span> <a href="index.html">猫吃狗</a> · 用 ❤️
        记录生活
      </p>
    </footer>

    <!-- 回到顶部 -->
    <button id="backToTop" class="back-to-top" title="回到顶部">↑</button>

    <!-- 脚本 -->
    <script src="js/config.js"></script>
    <script src="data/posts.js"></script>
    <script src="js/data.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/admin.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("footerYear").textContent =
          new Date().getFullYear();

        Admin.init();
        CalendarApp.init("calendarContainer", "monthDetail");

        // 回到顶部
        const backToTop = document.getElementById("backToTop");
        window.addEventListener("scroll", () => {
          if (window.scrollY > 400) {
            backToTop.classList.add("visible");
          } else {
            backToTop.classList.remove("visible");
          }
        });
        backToTop.addEventListener("click", () => {
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      });
    </script>
  </body>
</html>
