# cateatdog - 自动生成日记索引
# 当 posts/ 目录下的 Markdown 文件发生变化时，
# 自动运行 generate-index.py 并提交更新后的 data/posts.json

name: 生成日记索引

on:
  push:
    branches:
      - main
      - master
    paths:
      - "posts/**"
      - "scripts/generate-index.py"
  workflow_dispatch:
    # 允许手动触发

permissions:
  contents: write

jobs:
  generate-index:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: 🔍 生成索引
        run: python scripts/generate-index.py

      - name: 📤 提交更改
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posts.json data/posts.js
          git diff --staged --quiet || git commit -m "📝 自动更新日记索引"
          git push
